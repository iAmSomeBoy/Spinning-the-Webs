<!DOCTYPE html>
<html lang="en">

  <!--
    =========================================================
    01 — BASIC BODY SKELETON
    The minimal valid HTML page structure.

    HIERARCHY:
    html
     ├── head   (invisible metadata)
     └── body   (all visible content)
    =========================================================
  -->

  <head>
    <!-- head can only contain metadata tags — nothing visible -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01 — Basic Body Skeleton</title>
    <!--
      Valid children of <head>:
        <title>   — tab/window title
        <meta>    — metadata (charset, viewport, description)
        <link>    — external CSS files
        <style>   — inline CSS
        <script>  — JavaScript
    -->
  </head>

  <body>
    <!--
      <body> is the parent of ALL visible content.
      It is a direct child of <html>, sibling of <head>.

      Valid direct children of <body>:
        <header>, <main>, <footer>, <nav>, <aside>  ← page regions
        <div>, <section>, <article>                 ← containers
        <h1>–<h6>, <p>, <ul>, <ol>                 ← content blocks
    -->

    <p>This is the most basic valid HTML page.</p>
    <p>Everything visible must live inside body.</p>

  </body>

</html>
